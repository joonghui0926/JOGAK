services:
  postgres:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_DB: jogak
      POSTGRES_USER: jogak
      POSTGRES_PASSWORD: jogak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/backend/sql/postgis_indexes.sql:/docker-entrypoint-initdb.d/10-postgis-indexes.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
